<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day8 with DB</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
      }
      form {
        display: grid;
        gap: 10px;
      }
      input {
        padding: 8px;
        font-size: 16px;
      }
      button {
        width: fit-content;
        padding: 8px 16px;
        font-size: 16px;
      }
      #status {
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <h1>Client / Server / Database メッセージ送信</h1>

    <form id="messageForm">
      <input id="nameInput" type="text" placeholder="名前を入力" />
      <input id="contentInput" type="text" placeholder="メッセージを入力" />
      <button type="submit">送信</button>
    </form>

    <p id="status"></p>

    <script>
      const form = document.getElementById('messageForm');
      const nameInput = document.getElementById('nameInput');
      const contentInput = document.getElementById('contentInput');
      const status = document.getElementById('status');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const name = nameInput.value.trim();
        const content = contentInput.value.trim();

        if (!name || !content) {
          status.textContent = '名前とメッセージを入力してください';
          return;
        }

        const payload = { name, content };
        console.log('[CLIENT] 送信前データ:', payload);

        try {
          const response = await fetch('/api/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });

          const result = await response.json();
          console.log('[CLIENT] 送信後レスポンス:', result);

          if (!response.ok || !result.success) {
            status.textContent = '送信に失敗しました';
            return;
          }

          status.textContent = '送信しました';
          nameInput.value = '';
          contentInput.value = '';
        } catch (error) {
          console.error('[CLIENT] 送信エラー:', error);
          status.textContent = '送信に失敗しました';
        }
      });
    </script>
  </body>
</html>
